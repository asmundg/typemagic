name: Release

on:
  push:
    tags: ['v*']

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y typemagic-macos.zip typemagic.app
      - uses: actions/upload-artifact@v4
        with:
          name: typemagic-macos
          path: build/macos/Build/Products/Release/typemagic-macos.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath typemagic-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: typemagic-windows
          path: typemagic-windows.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: typemagic-macos
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: typemagic-windows
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/typemagic-macos.zip
            artifacts/typemagic-windows.zip
